<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyTickets — Ошибка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="screen">
        <div class="logo">
            <h1>SkyTickets</h1>
            <p>Сервис продажи авиабилетов</p>
        </div>

        <div class="error-message">
            <div class="error-icon">❌</div>
            <h2>Оплата не прошла!</h2>
        </div>

        <div class="payment-block">
            <div class="payment-title">Причина</div>
            <div class="flight-detail" style="text-align: center; margin-bottom: 10px;">
                Неверный CVV-код
            </div>
            <div class="flight-detail" style="text-align: center; color: #7f8c8d;">
                Пожалуйста, проверьте данные карты и попробуйте снова
            </div>
        </div>

        <div class="button-row">
            <a href="Payment.html">
                <button class="btn-back" style="flex: 1;">Попробовать снова</button>
            </a>
            <a href="Search.html">
                <button class="btn-next" style="flex: 1;">На главную</button>
            </a>
        </div>
    </div>

</body>
</html>
