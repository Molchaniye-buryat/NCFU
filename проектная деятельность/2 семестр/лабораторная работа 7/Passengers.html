<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyTickets — Данные пассажиров</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="screen">
        <div class="logo">
            <h1>SkyTickets</h1>
            <p>Сервис продажи авиабилетов</p>
        </div>

        <div class="form-title">ДАННЫЕ ПАССАЖИРОВ</div>

        <div class="route-info">
            Рейс SU 1234 | Москва → Санкт-Петербург | 29.05.2026 | 8:00
        </div>

        <div class="passenger-block">
            <div class="passenger-title">Пассажир 1</div>
            
            <div class="input-group">
                <label>ФИО</label>
                <input type="text" placeholder="Иванов Иван Иванович">
            </div>
            
            <div class="row-group">
                <div class="input-group half">
                    <label>Серия паспорта</label>
                    <input type="text" placeholder="1234">
                </div>
                <div class="input-group half">
                    <label>Номер паспорта</label>
                    <input type="text" placeholder="567890">
                </div>
            </div>
            
            <div class="input-group">
                <label>Дата рождения</label>
                <input type="date">
            </div>
        </div>

        <div class="passenger-block">
            <div class="passenger-title">Пассажир 2</div>
            
            <div class="input-group">
                <label>ФИО</label>
                <input type="text" placeholder="Иванова Мария Петровна">
            </div>
            
            <div class="row-group">
                <div class="input-group half">
                    <label>Серия паспорта</label>
                    <input type="text" placeholder="1234">
                </div>
                <div class="input-group half">
                    <label>Номер паспорта</label>
                    <input type="text" placeholder="567891">
                </div>
            </div>
            
            <div class="input-group">
                <label>Дата рождения</label>
                <input type="date">
            </div>
        </div>

        <div class="contact-block">
            <div class="passenger-title">Контактные данные</div>
            
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="ivanov@example.com">
            </div>
            
            <div class="input-group">
                <label>Телефон</label>
                <input type="tel" placeholder="+7 123 456-78-90">
            </div>
        </div>

        <div class="button-row">
            <a href="List.html">
                <button class="btn-back">← Назад</button>
            </a>
            <a href="Payment.html">
                <button class="btn-next">Перейти к оплате →</button>
            </a>
        </div>
    </div>

</body>
</html>
