<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyTickets — Поиск авиабилетов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="screen screen-search">
        <div class="logo">
            <h1>SkyTickets</h1>
            <p>Сервис продажи авиабилетов</p>
        </div>

        <div class="search-form">
            <div class="form-title">ПОИСК АВИАБИЛЕТОВ</div>

            <div class="input-group">
                <label for="from">Откуда</label>
                <input type="text" id="from" placeholder="Город или аэропорт" value="Москва">
            </div>

            <div class="input-group">
                <label for="to">Куда</label>
                <input type="text" id="to" placeholder="Город или аэропорт" value="Санкт-Петербург">
            </div>

            <div class="input-group">
                <label for="date">Дата вылета</label>
                <input type="date" id="date" value="29-05-2026">
            </div>

            <a href="List.html">
                <button class="btn-search" type="button">Найти</button>
            </a>
        </div>
    </div>

</body>
</html>
