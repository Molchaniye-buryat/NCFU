<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyTickets — Успех</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="screen">
        <div class="logo">
            <h1>SkyTickets</h1>
            <p>Сервис продажи авиабилетов</p>
        </div>

        <div class="success-message">
            <div class="success-icon">✅</div>
            <h2>Билет успешно куплен!</h2>
        </div>

        <div class="booking-number">
            Номер бронирования: SKY-13432-353
        </div>

        <div class="payment-block">
            <div class="payment-title">Детали поездки</div>
            <div class="flight-detail" style="margin-bottom: 8px;">Рейс: SU 1234 | Аэрофлот</div>
            <div class="flight-detail" style="margin-bottom: 8px;">Маршрут: Москва → Санкт-Петербург</div>
            <div class="flight-detail" style="margin-bottom: 8px;">Дата: 29.05.2026 | Время: 8:00</div>
            <div class="flight-detail">Пассажиры: 2</div>
        </div>

        <div class="route-info">
            Подтверждение отправлено на email: example32@gmail.com
        </div>

        <a href="Search.html">
            <button class="btn-search" style="margin-top: 20px;">На главную</button>
        </a>
    </div>

</body>
</html>
